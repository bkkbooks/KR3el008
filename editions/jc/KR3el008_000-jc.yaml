body:
  text: 正文凡跌打損傷十六歲以上者易治血氣有餘故也十六歲以下難醫血氣衰弱故也凡傷七日之內血氣未曾積聚十四日之後者血氣凝結恐生別症春傷肝凶夏傷心凶秋傷肺凶冬傷腎凶傷肝者面紅紫黑先服清肝止痛後服中續命飲再服順氣活血湯而愈傷心者心下主熱目閉口不能言先服護心養元湯再服通聖飲後服和中丸不然主一日內死傷肺者鼻內氣喘聲啞發熱睡如弓狀著席如刀此症主三日內死先服通聖飲後服降氣活血湯再服清肺止痛飲傷腎者兩耳必聾耳角必黑先服吉利散後服中續命飲再服補腎和血湯不然一七必死傷心口者必當胸迷悶面黃發脹先服降氣活血湯再服通聖飲再服順氣活血湯傷食肚者即時氣升心迷先服降氣活血湯再服中續命飲後服吉利散不然一日內死凡傷者眼白者死口臭者死搖頭髮直者死遺尿者死通聖飲通草一錢紅曲一錢五分炒蘇木一錢炒生甘草五分麥芽一錢炒紅花一錢炒香附二錢便制丹皮八分山楂肉八分歸尾一錢酒洗烏藥一錢穿山甲二錢炙胡桃肉五錢酒水各兩杯煎兩鍾不拘時服大續命飲桔梗八分乳香一錢去油沒藥八分去油山楂肉一錢麥芽八分歸尾二錢酒洗桃仁一錢去皮尖官桂八分生地黃一錢紅曲八分蘇木六分通草八分穿山甲八分紅花八分香附一錢便制牡丹皮八分陳皮六分烏藥八分甘草六分酒水各三鍾煎鍾半不拘時服小續命飲紅曲一錢五分炒研甘草五分蘇木一錢二分山楂肉一錢麥芽一錢炒通草一錢當歸一錢酒洗牡丹皮一錢烏藥二錢紅花五分香附一錢便制穿山甲一錢炙酒水各一碗煎八分不拘時服降氣活血湯紅花八分蘇木八分官桂六分五加皮一錢歸尾一錢酒洗杏仁八分牛膝六分赤芍一錢桃仁一錢去皮尖酒一鍾水半鍾童便一鍾煎一鍾服中續命飲紅花八分川芎六分赤芍八分歸尾一錢酒洗桃仁一錢去皮尖蘇木八分烏藥六分穿山甲一錢炙神麯六分麥芽一錢陳皮六分柴胡八分莪朮一錢官桂六分紅曲六分枳殼六分乳香八分去油沒藥一錢去油酒兩鍾煎一鍾服護心養元湯歸身一錢酒洗川芎一錢紫蘇八分生甘草六分香附一錢便制連翹六分獨活六分杜仲一錢炒去絲柴胡六分青皮八分枳殼六分水兩鍾煎八分服不發熱者不用流傷飲劉寄奴一錢骨碎補五錢元胡索五錢水兩鍾煎一鍾傾入童便一鍾沖服和中丸五臟六腑內傷當歸一兩酒洗蘇木六錢桃仁一兩去皮尖赤芍五錢烏藥六錢丹皮八錢枳殼六錢廣木香四錢三稜四錢香附一兩便制莪朮四錢穿山甲八錢檳榔五錢沉香末五錢甘草四錢薑黃六錢延胡索六錢乳香四錢去油沒藥四錢去油降香末四錢麝香五分地鱉蟲五錢燒酒入麝香浸炙淨末上為細末煉蜜為丸每丸重二錢硃砂為衣好酒空心送下跌打損傷膏藥方當歸川芎蒼朮赤芍木鱉子大黃川烏草烏各一兩上藥八味用香油四斤春秋浸五日夏浸三日冬浸七日然後熬藥至枯濾去渣下瀝青八兩煉淨松香八兩成膏離火略冷方下肉桂淨末二兩丹皮淨末二兩乳香去油淨末四錢沒藥去油淨末二錢俱為極細末用桑枝攪勻用時先將生薑胡椒擦患處令熱然後貼之打傷腹中瘀血方當歸二兩蒲黃一升桂心二兩共為細末每服二錢好酒送下損傷瘀血方大黃一兩酒蒸杏仁三十七粒用水一碗煎八分空心服奪命七釐散黃麻皮灰一兩存性生大黃五錢桃仁五錢去皮尖自然銅二錢醋浸一夜醋煅七次地鱉蟲火酒入麝香浸炙淨末二錢共為細末每服輕者七分重者一錢好酒送下輕傷小七釐散地鱉蟲二錢炙淨末乳香一錢去油沒藥八分去油骨碎補一錢大黃一錢血竭一錢共為細末每服七八釐空心好酒送下打傷腫毒止痛方無名異二兩上為細末好酒送下四肢血脈皆效即傘店內土故紙內傷氣食方紅花枳實檳榔各六分厚朴八分莪朮三稜黃芩各六分柴胡八分當歸桃仁去皮尖青皮大黃各一錢水二鍾煎八分入朴硝七分一沸即起五更空心服午後行打墜腰滯瘀血方破故紙炒大茴香炒辣桂各五錢上為細末每服一錢好酒熱服空心送下打傷接骨方乳香去油沒藥去油龍骨真醋炙存性自然銅醋浸炙存性地鱉蟲炙末各二錢共為細末作二服好酒送下大刑膏藥方真麻油二兩黃蠟鉛粉各七錢五分輕粉血竭各二分半冰片五釐先將油熬老下黃蠟於油內次下鉛粉再下輕粉血竭離火略冷方下冰片老嫩得法為妙大刑煮酒方當歸川芎牛膝生地紅花續斷薏仁防風丹皮五加皮十大功勞老君須杏仁去皮尖以上各三分蜻蜓兩隻小茴香二分乳香二分去油沒藥二分去油蟬蛻二分紫金皮三分隔湯煮三柱香取起再加無灰白燒酒二斤於藥酒內不時服之夾打預服護心丹乳香去油沒藥去油血竭各五分兒茶一錢木耳二錢焙乾白蠟一錢辰砂七分青木香一錢琥珀三分海螵蛸五分天灰蓋三分煅上藥共為細末砂糖為丸如芡實每服三丸好酒送下受刑槌背即消矣詩曰跌原防意外打或遇災侵損傷真堪憫傷筋未易針奇書真若玉驗藥貴如金全得蒼生命方知重少林少林寺秘傳應驗跌打損傷奇方真本卷之終穴道囟門即天庭蓋骨碎出不治兩太陽傷重難治截梁即鼻梁兩眼對直處打斷不治突即結喉打斷不治塞即結喉下橫骨上空潭上打傷不治塞下為橫骨下直至人字骨懸一寸三分為一節下一節凶一節食肚心坎下丹田臍下一寸三分內即膀胱倒插傷不治一月而死外腎捏碎不治腦後與囟門同看百勞與外對天柱骨與突對斷不治尾子骨碎者不治兩腎在脊左右與前臍對或哭不治海底穴大小便兩界處重傷不治軟肋左乳下即合肚氣門在乳上脈動處傷即氣塞救遲不過三時血海右乳下軟肋兩乳上左傷久必發咳右傷久必發呃驗症吉凶一看兩眼內有瘀血白睛必有血筋血筋多瘀血亦多血筋少瘀血亦少眼及睛活動易治否則難療二看指甲掀其中指甲放如即還血色易治少頃後還原者病重如紫色者不治三看陽物不縮者可治縮者難治四看足爪與手指同看五看腳底紅活者易治色黃者難治以上為五絕五絕全犯者不治如犯一二件尚可醫治拳傷辨向上為順氣平拳為寒氣倒插為逆氣最凶各樣內傷總怕倒插血隨氣轉氣逆血只凝故也心前背後相對處傷久成怯小膀肚腹打傷久必成黃病凡人初打傷七日之內血氣未曾積聚只宜發散活血十四日其瘀血或有停住在胸前其勢方歸大腸肚內作痛要吃行藥凡人打傷要看指甲黑亦有傷其卵子上升十分凶症肝經脈數胸傷有血必然吐血跌打損傷穴道要訣右胸名為痰穴左胸名為氣穴右肋名為血海左肋名為食腑胸前乃為龍潭穴背脊為海底穴左乳傷發咳右乳傷發呃兩腰為二珠穴凡跌打踢撲傷男人傷上部者易治傷下部難醫以其氣上升故也婦人傷下部者易治傷上部者難療以其血下降故也凡傷須驗在何部按其輕重明其受傷新久男子氣從左轉左只屬陽女人血從右轉故右屬陰要分氣血之辨此症既受臟腑脈絡又復驗其生死遲速然後看症用藥或竟服吉利散一傷全體者死速然按其輕重隨症用藥先以砂仁泡湯調吉利散服之以順氣活血湯治之仍以和傷丸糖酒下四五丸再以調理藥酒每朝飲下輕者竟以紅糖油和酒調服吉利散而安二傷肩背者看其輕重如重者先以砂仁湯調吉利散服下次以和傷丸酒化服再以調理藥酒更妙如輕者用紅糖油和酒調吉利散服之而安三傷左邊者氣促面黃浮腫傷右邊者氣虛面白血少即將行氣活血湯治之再服調理藥酒全治四傷背者五臟皆繫於背雖凶死緩先多服吉利散治之次服和傷丸糖酒送下四五服百日見危須服調理藥酒為妙五傷胸者胸以血涵停流往來之所傷久必發咳嗽高氣迷悶面黑髮熱重三四日而死先服蘇風理氣湯次服行氣活血湯吉利散六傷肝者面主紅紫眼赤發熱主七日死先服蘇風理氣湯次服吉利散後服琥珀丸而愈七傷心口者面青氣少吐血呼吸大痛身體難於舒動主七日而死先服蘇風理氣湯次服和傷丸每日以一百合煎湯不時飲之八傷食肚者心下捉陣而痛發熱高浮如鼓皮緊飲食不進氣促發熱眼閉口臭面多黑色主七日死先服蘇風理氣湯次服和傷丸九傷腎者兩耳即聾額角黑色面浮白光常如哭狀腫如弓形主半月死先服蘇風順氣補血湯次服補腎活血湯三四劑再服吉利散後服琥珀丸十傷小腸者小便閉塞作痛發熱口乾面腫氣急不時作痛口有酸水主三日而死先以水酒各一鍾煎蘇風順氣湯服之次用吉利散後服琥珀丸即安如閉塞數日者不治十一傷大腸者糞後出紅急澀面赤氣滯主半月死先服槐花湯次服吉利散後用和傷丸又曰糞後有紅者傷重也非大腸之火看症者須斟酌宜即用槐花散尚宜加減為妙十二傷膀胱者小便痛澀不時有尿滴出脹腫發熱主五日死先服琥珀丸次服行氣活血湯而安十三傷陰囊陰戶缺十四傷胸背俱傷者面白肉瘦食少發熱咳嗽主半月死先服蘇風理氣湯後用和傷丸十五傷氣眼者氣喘大痛夜多盜汗身瘦食少腫痛不寧主一月內死先用砂仁湯調吉利散次以酒煎補腎活血湯服之再服和傷丸可安十六傷血海者血多妄行口常吐出前後胸背板滯作痛主一日內死先服行氣活血湯次服吉利散再飲藥酒而安十七傷兩肋者氣喘大痛腫如刀刺面白氣虛主兩月內死先飲行氣活血湯次服和傷丸而安十八傷兩肋痛者肝火有餘氣實火盛之故須用清肝止痛湯治之十九或有清痰食積流注而兩肋痛者須用清肺止痛飲次服吉利散而安二十登高跌撲損傷瘀血凝滯而肋痛急將大黃湯治之次服吉利散後用和傷丸即安二十一醉飽房勞脾土虛乏肝脈得乘土位而胃腕當心連兩肋痛者急投歸原養血和傷湯再以十全大補丸加減每朝送下三錢為妙二十二傷寒發熱兩肋痛者以足少陽膽經足厥陰肝經之病治用柴胡湯二十三左肋痛者痰與食也先須通利痰食氣寬胸為主再以活血止痛飲服之更以琥珀丸化服而安二十四瘀血疼痛者傷處有紅腫高起肥白者發熱而痛多氣虛瘦人發寒熱而痛多怒內有瘀血兼腰痛日輕夜重此瘀血停止故作痛也速宜以琥珀散行之後服和傷丸再飲調理藥酒二十五有受傷而不能開口者即以牙皂細末吹入鼻中一嚏即開隨以韭白汁頓熱和童便灌入口內如不納此為難治之症若納同瘀血嘔出者辨其輕重先以吉利散用砂仁湯服再服清心和氣湯外貼接骨膏至重者又不吐血頭又昏迷將韭白汁和陳酒服下如破碎損傷折骨者用封口藥護之如小便不通琥珀散通之如腹內疼痛必有瘀血停住急以大黃散行之後當隨症加減用藥戳入鼻內即涕涕隨吐痰者可無恙否則凶症不治二十六小便不通澀滯脹痛尿滴點而出梗竅痛如刀刺以琥珀散治之後以蟋蟀乾研末茶床子湯送下二十七如有一切撲磕損傷以至腹內停止瘀血作痛不寧竟以大黃散行之二十八有受傷至首骨碎損染破傷風者夫人之首原無舊骱倘有跌撲折損之症如腦髓出者難治倘骨碎如黍粒者可取出大隻不可先以止血定痛散敷之使血不湧流俟血少定金瘡藥敷之避風戒欲患者自宜慎之若染破傷風牙關緊閉角弓反張之凶症即以蘇風理氣湯服之俟身不發熱再投補中益氣湯服之可安二十九有鬥傷落珠之症先將收珠散敷之用銀針蘸井水將前收珠散點紅筋次用絹溫湯挪進速用還魂湯即童便飲之平復再以明目生血飲飲之即安然餘五世未醫此症非有迴天手不可也倘後人或遇此症可以醫之三十鼻梁折斷者可捏正斷骨先用止血散摻之竟服壯筋續骨丹其外自然平復如不斷不破惟用損傷膏貼之內服吉利散而安三十一有缺唇之症先用代痛散敷之即麻藥小銅鉗鉗牢將油棉線縫合飲食不能進當以參湯飲之否以元米粉調薄粥湯飲之切忌哭笑合之後即以金槍藥敷之內服止痛活血散縫時倘血冷必須再用代痛散以利刀略鐮待熱血少流出而縫之第一要手法快便為要三十二人之頭惟有下頦一骱偶然落之不能上者多腎虛之故得之皆此骱如剪復連環相扭用絲棉裹大指入口余指抵下推緩緩捺上推進而多服補腎活血湯再將補腎丸調理為妙三十三天井骨急難損折有登高倒跌者犯此惡症其骨不綁縛至有骨露於外者此實凶候務撳平其骨先貼損傷膏次服吉利散以砂仁湯服下使骨相對用棉布連肩背絡之又投提氣活血湯三四劑而安三十四天井骨即頭頸骨也此症如傷重者必死折者不過三四時亦死輕者覺無妨礙用前藥治可以收功三十五肩骱與膝骱相似膝骱送上有力肩骱送下有力可上之先將一手上按住其肩一手按住其手緩緩轉動使其筋舒使患者坐於低處叫一人抱住其身醫者兩手又捏其肩抵住其骨將膝夾其手齊力而上綿裹用如鵝蛋大落在胯下外貼損傷膏再以羌活桂枝煎湯化服吉利散可安此骱上時須仔細斟酌參用不可孟浪三十六臂骱出於上一手抬其灣一手按住其脈踝先掬其上而後抬其挽竟捏手湊攏可也外貼損傷膏內以經之劑煎湯調吉利散服更以白布做圓眼使恰柊其臂骨者扎縛包裹可也此有孔孔布必須做來正好為妙兩頭帶兩條要長布亦須裹之四轉為妙三十七手骱送出可一手按住其五指一手按住其臼手掌掬起手骱掬下一伸而上此乃會脈之所即以川桂枝煎湯調吉利散服之骱出不用綁束如斷方須用貼接骨膏綿布包裹用闊板一塊按住患處再以松板四片長三寸縛好俟愈日方可放之三十八手指有骱中節出者有緒然易出易止兩指捻伸即上以桂枝煎湯調服活血上止散外貼損傷膏否最痛故也忌下水三十九人之一身十指最難若傷破其一指則連心之痛難忍中指比別指尤難若染破傷風即將蘇風理氣湯服之外將金瘡藥敷之四十臂骱比諸骱最難此臼出只觸在眼內可使患者側臥出內手隨內出外手隨外上手撳住其腰下捧住其灣將膝掬其上出左手扳於右向右扳伸而上出右扳於左向左扳伸而上外貼損傷膏內服生血補髓湯仍用調理藥酒即安臂骱式出左右脥墊藥枕內蘄艾一兩紅花五錢肉桂三錢麝香二分四十一易折者人之兩腿一傷折即為兩段醫在於綁縛使患者側臥與無病足取齊次用損傷膏貼之取布兩條闊二寸長五尺裹於膏藥外將紙包好用松木板八塊即八片長七寸再以綿布條三條綁縛內服活血定痛散三四劑又以壯筋續骨丹調理藥酒兼服而安四十二膝骱此臼與油盞骨在上其骱送出於上使患者仰臥一人抬起腳踝若使出於左隨左而下出於右隨右而下醫者緩緩雙手扶撳上手挽住其膝下手按住其足骻使臼對膝上手只撳膝下手只抬起必上矣先貼接骨膏次服壯筋續骨丹而安四十三膝蓋骨又名冰骨其骨如跌碎或二塊三塊將腳伸直撳其手復用薄篾片照膝大做一圈以布卷之再以布條四條扣於圈上連下縛之著內然後以布損傷膏貼之不必換即投止痛接骨丹治之惟煮鴨可食連湯與吃以多為美以受傷足於月內床上切不可懸空掬起及下床俟半月後須用綿軟之物放於灣下每日增高息起如此日久即可輓曲如大解須以餘桶照床高床擺之方可俟好抬篾圈忌下水綁紮後以煎劑服之附錄煎方當歸羌活丹皮乳香續斷陳皮赤芍加皮沒藥紅花各一錢生地木瓜牛膝各一錢五分如身發熱加柴胡桔梗各一錢五分腫加黃芩一錢上用水酒各一鍾煎一半空心熱服不拘幾帖多隻七八劑再以藥酒或丸調理為妙四十四小膀有二骨一大一小折一根易治二根俱斷難治折之偶披者易治平斷者難治尚有骨觸皮破之凶症又折又破急於外治先以金瘡藥敷之內服吉利散如在暑天敷藥一日換二次冬天兩日換一次醫者必自看為妥若非此症與大腿同治倘犯此症骨必在皮肉之上以骨鑲對不可用湯薰洗恐傷毒入內故也速以金槍藥敷之如骨折皮不破撳骨平復外竟貼接骨膏然後照前綁紮用松木板六塊長七寸上骨折上長下骨折下長各寸許取其根力但此症最痛必先服止痛接骨丹數劑次服壯筋續骨丹及藥酒調理可安四十五腳踝骱易出易入抬住腳跟一手扳住其指出右手偏於右出左手偏於左足指掬於上足掬下一伸可上外貼損傷膏內服寬筋散可復四十六有男婦偶破足指前半節或翻下斷或翻上斷醫者以左手按捏住其足之兩側再以右捏手鑲上外貼損傷膏以腳帶裹紮內服壯筋續骨丹或竟服吉利散數劑即安忌見水外有促筋失枕刀斧砍傷碎骨補骨之奇備詳於下四十七槍戳者看其傷處致命否傷處深否致命不深亦不為害如傷在腹必探其深淺恐深處內傷臟與大腸耳傷者難治傷口直者出血不止先敷止血定痛散即安大抵舒筋必用寬筋散煎湯薰洗為主手足之筋皆在指頭動處指動者必此筋也就將此筋挪洗緩緩伸舒可也如骨節斷者不可薰洗戒之失枕有臥而誤失者使其低處一手扳其手一手扳其下頦緩緩伸之可復如要用藥惟吉利散如人受傷至重以致大便不通者須用皂角為末以蜂蜜調和為丸如橄欖式摔入便內即通更有受陰極者十皆九死無藥可治四十八刀斧砍傷頭顱額角者防其身發寒熱一見即以金槍藥敷之護風為上尤須診脈沉細者生易治洪大者危難醫傷於硬處者看骨損否傷於軟處者看傷內深淺損骨先治骨損肉只生肌刀斧砍傷比觸傷不同外敷金槍藥內服護心托裡散為上更宜詳究首論原無舊骱內參用四十九有人自以刀勒咽喉者須觀刀口之平否有灣者深無灣者淺兩刀者易治一刀勒者難醫如破食喉或破半片或全斷者以油綿線縫之看其血出不止將滑石五倍各等分共為細末敷之後將金槍藥封固內服護風托裡散四五劑使身不發寒熱即服補中和氣湯內加人參錢半即安倘有水喉斷者並穿破者不治五十肚腹皮傷並腸出外者此症固險而實無害醫者當去指甲恐傷破其腸耳倘內臟不傷藥湯飲食可進可保無恙將溫湯揉上用油綿線縫合金槍藥封固內服通腸活血湯五六劑再服補中益氣湯而安五十一骨碎如粉者看其傷處必有碎骨當取出外將金槍藥封固內服生血補髓湯再服壯筋續骨丹如碎而不破只捏平復外將損傷膏貼之內服壯筋續骨丹再將藥酒調理如不碎不破竟以損傷膏貼之內用吉利散以紅糖油調酒服下即安五十二有登高墜下者兼跌撲損傷不拘上下背脊骨者若破看其骱出否如其骱又出又破即將碎骨輕撳上平復即將止血定痛散敷之後將金槍藥封固恐傷風急投蘇風理氣湯如不發寒熱即以補中益氣湯服下全愈如不觸出並不破碎皮肉不損外貼接骨膏內服吉利散次服調理藥酒再用和傷丸即安五十三登高跌撲折左右肋者此骨難於綁縛只撳其平外貼損傷膏內用接骨散久服可復五十四捏碎陰囊者並卵子拖出者卵子碎者不治惟拖出者以指輕輕掀進以油棉線縫合外以金槍藥封固如不發熱竟投吉利散治之次服托裡止痛散如發熱急以蘇風理氣湯治之五十五有捏傷陽物者看其小便若不通投琥珀散行之後以吉利散治之若通竟以吉利散外敷金槍藥如不破不用五十六踢傷肛門穀道者有肛門可腫或內脹或大便不通或有血無血如腫脹投以通腸活血湯大便不通竟以大黃湯行之如有血來紫者不妨有吉利散治之若鮮者只傷於大腸急投槐花散如隻身熱再服除熱之藥恐用藥矣大便不通血已止竟服通腸活血湯五六劑治之即安後有總論五十七被火燒槍炮打傷者此症論之最重何為最重恐火毒入於內臟不能飲食更畏熱物不時思飲冷水乃見火毒入內太重之故也急投清心去毒散何為最輕火毒未入臟腑飲食如常知火毒之輕也傷破皮肉亦將去毒散投下此乃小心之法外將琥珀膏敷之可安五十八斬落手臂指腳腿膀者此症乘其被此血熱湊上妙或手或臂以通身如血冷者骨不能相對此大不便於醫治矣人雖不死然不能完體矣若能湊上立將止血散敷之再以金槍藥封固內服托裡止痛散再服調理之劑並藥酒可安五十九或斷橋梁牆壁城垣傾倒壓折骨節者若傷頭顱可有碎骨否如有將銅鉗鉗去碎骨如不去碎骨恐有後患不能收口第一畏染破傷風須投護風理氣湯次服接骨丹如傷兩太陽暈迷不蘇飲食不下口不能言湯水不下竟不能醫治腦髓出者不治傷斷天井骨者不治如傷胸背以致傷五臟者必不言語飲食不進尚可救之何也氣悶在心急以吉利散用砂仁湯調服若受此藥尚可救治如發寒熱急投護風理氣湯倘不受再看兩日再投吉利散如前探之如再不受不治若傷兩軟肋看其輕重飲食如常不發寒熱以吉利散治之若發寒熱投蘇風理氣湯如傷腰子者重竟不治輕者如皮肉不破外貼損傷膏內服補腎和血湯並藥酒調理而安六十凡打傷倒插或紫致命部穴受害牙關緊閉口眼不開者先以砂仁炒研細末泡湯令受傷人飲之順氣次以吉利散淡薑湯調服六十一傷頭顱額角破損昏迷不蘇須用紅蘿蔔子炒研為末泡湯飲之次將淡薑湯調吉利散服下如服傷最重者用前散二錢輕者一錢最宜避風為上此症恐染破傷風服過砂仁湯即以蘇風理氣湯投下一劑護風為要六十二小腸受踢打撲跌傷痛者傷處痛澀滯小便閉塞一步不能行走其內必定有瘀血急投歸通破血湯而安如小便二三尚可救治否此大便可遲遲久實難治矣不久可治也凡肛門穀道之中陰囊之後名曰海底穴或被踢傷或觸重傷看其傷之輕重或腫或青或黑或紫或紅或腫而兼紅紫痛及不忍者內服行氣活血止痛湯一劑外貼損傷藥次服吉利散如腫青黑身發寒熱小便不通兩卵子不時升上升下氣色迷悶小腹疼痛內必有瘀血須服蘇風行氣活血湯次服琥珀散外貼損傷膏亦服吉利散穀道脹腫大小便不通日夜發熱不思飲食坐臥不寧先服蘇風順氣湯次服琥珀丸氣喘發嗽欲笑欲哭小便滯澀紅腫不消作陣而痛先服補腎活血止痛湯次服吉利散再以補腎調理藥酒更有一經受傷即不能言語人事不省口出唾涎喉鼻喘息俱無六脈沉細面白無光此為凶症胸腋有動或可醫治以豬牙皂末少許入鼻否只以燈心蘸末吹入得涕竟以砂仁湯送下後仍用砂仁湯調吉利散服再將蘇風理氣活血止痛湯服之若身不發熱不犯前症但以補腎理氣順氣藥酒久服可安如犯即照前度調治傷處貼損傷膏倘略疼微痛只用吉利散砂仁湯調服貼膏而愈不必用他藥也接骨膏又名損傷膏當歸川芎赤芍杜仲白芷殭蠶銀花川烏草烏羌活獨活防風荊芥山甲大黃黃芩黃柏蟬蛻管仲龜板皂角連翹各一兩五倍子五錢蜈蚣五條松節五錢薺泥五錢此一味可有可無加三七三兩上用真豆油五斤漸下諸藥煎至滴油不散候藥枯濾淨去渣將東丹兩包炒至紫色以篩漸入調勻滴入水內看老嫩再加下乳香五錢沒藥五錢樟冰五錢蟾酥末三錢略蒸調勻至半個時辰傾水中逐隨水去火氣聽候攤用每膏重四錢每張麝香二三分桂心二分吉利散治新舊一切損傷又名七釐散即黃末藥當歸一兩川芎四錢赤芍一兩烏